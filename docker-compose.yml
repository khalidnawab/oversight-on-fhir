services:
  hapi:
    image: hapiproject/hapi:v8.10.0-2
    container_name: oversight-hapi
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.fhir_version: R4
      hapi.fhir.allow_multiple_delete: "true"
      # Demo server: don't block writes/deletes on dangling references. Prevents HAPI-1096 when an
      # oversight AuditEvent references a recommendation that was cleared by "Reset test data".
      hapi.fhir.enforce_referential_integrity_on_write: "false"
      hapi.fhir.enforce_referential_integrity_on_delete: "false"
    volumes:
      - fhir-data:/data/hapi
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/fhir/metadata"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s

  app:
    build: .
    container_name: oversight-app
    ports:
      - "8000:8000"
    environment:
      OVERSIGHT_FHIR_BASE_URL: http://hapi:8080/fhir
      # Default to the offline scripted demo backend so the stack runs with no API key.
      # Switch to frontier (needs ANTHROPIC_API_KEY + synthetic-only) or local by config alone.
      OVERSIGHT_BACKEND: demo
      OVERSIGHT_SYNTHETIC_DATA_ONLY: "true"
    depends_on:
      hapi:
        condition: service_healthy

volumes:
  fhir-data:
