<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oversight-on-FHIR</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 820px; margin: 2rem auto; padding: 0 1rem; color: #1a1a1a; }
    a { color: #0b5; } h1 { font-size: 1.4rem; } h2 { font-size: 1.1rem; margin-top: 1.6rem; }
    .disclosure { background: #fff7e6; border: 1px solid #f0c36d; padding: .6rem .8rem; border-radius: 6px; }
    .escalate { background: #fdecea; border: 1px solid #e57373; padding: .6rem .8rem; border-radius: 6px; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .evidence { font-size: .9rem; color: #555; } code { background: #f2f2f2; padding: .1rem .3rem; border-radius: 3px; }
    button { background: #0b5; color: #fff; border: 0; padding: .5rem 1rem; border-radius: 6px; cursor: pointer; }
    button.secondary { background: #666; } select, textarea, input { font: inherit; padding: .35rem; }
    table { border-collapse: collapse; width: 100%; } td, th { border: 1px solid #ddd; padding: .4rem .6rem; text-align: left; }
    .metric { font-size: 1.6rem; font-weight: 700; }
  </style>
</head>
<body>
  <p><a href="/">&larr; Oversight-on-FHIR</a> &nbsp;·&nbsp; <a href="/dashboard">Oversight dashboard</a></p>
  {% block content %}{% endblock %}
</body>
</html>
